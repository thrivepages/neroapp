name: mindplan_flutter
description: MindPlan - Your personal productivity & wellness companion
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Navigation
  cupertino_icons: ^1.0.2
  
  # State Management
  provider: ^6.1.1
  
  # Calendar & Date
  table_calendar: ^3.0.9
  
  # Icons
  lucide_icons: ^0.257.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # UUID
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
